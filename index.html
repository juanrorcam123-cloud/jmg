<!doctype html>
<html lang="es" data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title> JMG3 </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
      :root {
        --bs-body-bg: #0f1111;
      }


      #movieCarousel .carousel-item img {
        height: 500px;
        object-fit: cover;
        object-position: top;
        filter: brightness(0.7);
      }
      #movieCarousel {
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(255,255,255,0.5);
        border: 1px solid rgba(255,255,255,0.1);
      }
      .carousel-caption {
        text-align: left;
        left: 5%;
        right: 5%;
        bottom: 5%;
        padding: 20px;
        background: linear-gradient(to top, rgba(255,255,255,0.9), transparent);
        border-radius: 15px;
      }

      .nav-link.active {
        color: #0d6efd !important;
        font-weight: bold;
      }
      .placeholder-img {
        background-color: #2c2c2c;
        height: 500px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>

    <nav class="navbar navbar-expand-lg bg-dark-subtle border-bottom border-body p-3 rounded-bottom-4 shadow-sm">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#">
            <img src="icon.png" alt="Logo" width="60" height="37" class="d-inline-block align-text-top me-2">
        </a>

        <div class="d-flex align-items-center ms-auto">
          <ul class="navbar-nav me-3">
            <li class="nav-item">
              <a class="nav-link" href="#">Iniciar Sesión</a>
            </li>
          </ul>
          
          <button class="btn btn-outline-secondary btn-sm rounded-pill px-3" type="button">
            ES
          </button>
        </div>
      </div>
    </nav>

    <div class="container mt-5">
      <div class="row g-4">
        
        <div class="col-lg-8">
          <div id="movieCarousel" class="carousel slide carousel-fade" data-bs-ride="carousel">
            <div class="carousel-inner" id="carousel-content">
              <div class="carousel-item active">
                <div class="placeholder-img">
                  <div class="spinner-border text-primary" role="status"></div>
                </div>
              </div>
            </div>
            
            <button class="carousel-control-prev" type="button" data-bs-target="#movieCarousel" data-bs-slide="prev">
              <span class="carousel-control-prev-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Anterior</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#movieCarousel" data-bs-slide="next">
              <span class="carousel-control-next-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Siguiente</span>
            </button>
          </div>
        </div>

      </div> </div> <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      const API_KEY = 'ad9c7b13b24f9c633e5064880d4c7512'; 
      const carouselContent = document.getElementById('carousel-content');

      async function fetchMovies() {
        try {
          const response = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=es-ES`);
          const data = await response.json();
          
          if(data.results) {
            renderMovies(data.results.slice(0, 6));
          }
        } catch (error) {
          console.error("Hubo un error cargando las pelis:", error);
          carouselContent.innerHTML = '<div class="p-5 text-center">Error al conectar con la API</div>';
        }
      }
      function renderMovies(movies) {
        carouselContent.innerHTML = movies.map((movie, index) => `
          <div class="carousel-item ${index === 0 ? 'active' : ''}">
            <img src="https://image.tmdb.org/t/p/original${movie.backdrop_path}" class="d-block w-100" alt="${movie.title}">
            <div class="carousel-caption">
              <span class="badge bg-primary mb-2">Rating: ${movie.vote_average}</span>
              <h3 class="fw-bold">${movie.title}</h3>
              <p class="d-none d-md-block opacity-75">${movie.overview.substring(0, 220)}...</p>
            </div>
          </div>
        `).join('');
      }

      fetchMovies();
    </script>
  </body>
</html>
