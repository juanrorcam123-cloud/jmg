<!doctype html>
<html lang="es" data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title> JMG3 - Proyecto Cine </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
      :root {
        --bs-body-bg: #0f1111;
      }

      /* --- Carrusel Principal --- */
      #movieCarousel .carousel-item img {
        height: 500px;
        object-fit: cover;
        object-position: top;
        filter: brightness(0.7);
      }
      #movieCarousel {
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.1);
      }
      .carousel-caption {
        text-align: left;
        left: 5%;
        right: 5%;
        bottom: 5%;
        padding: 25px;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.4) 60%, transparent 100%);
        border-radius: 15px;
      }

      /* --- Lista lateral "A continuación" --- */
      .next-movies-container {
        max-height: 500px;
        overflow-y: hidden;
      }
      .movie-side-card {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 15px;
        padding: 10px;
        border-radius: 10px;
        transition: background 0.3s;
      }
      .movie-side-card:hover {
        background: rgba(255, 255, 255, 0.05);
      }
      .movie-side-card img {
        width: 70px;
        height: 100px;
        object-fit: cover;
        border-radius: 5px;
      }
      .movie-side-info h6 { margin: 0; font-size: 0.9rem; font-weight: bold; }
      .movie-side-info p { margin: 0; font-size: 0.8rem; color: #bbb; }

      /* --- Sección Destacado Hoy --- */
      .featured-card { cursor: pointer; transition: transform 0.3s ease; border: none; background: transparent; }
      .featured-card:hover { transform: scale(1.02); }
      .featured-img-container { position: relative; overflow: hidden; border-radius: 12px; }
      .featured-img-container img { height: 300px; width: 100%; object-fit: cover; display: block; }
      .overlay-text {
        position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px;
        background: linear-gradient(transparent, rgba(0,0,0,0.9));
      }

      /* --- Sección Celebridades --- */
      .section-header { display: flex; align-items: center; margin-bottom: 5px; }
      .yellow-line { width: 4px; height: 28px; background-color: #ffc107; margin-right: 12px; border-radius: 2px; }
      
      .celebrity-scroll {
        display: flex; overflow-x: auto; gap: 20px; padding: 20px 0;
        scroll-behavior: smooth; scrollbar-width: none;
      }
      .celebrity-scroll::-webkit-scrollbar { display: none; }
      
      .celebrity-item { flex: 0 0 auto; width: 150px; text-align: center; cursor: pointer; }
      .celeb-img-wrapper {
        width: 140px; height: 140px; border-radius: 50%; overflow: hidden;
        margin-bottom: 10px; border: 2px solid rgba(255,255,255,0.1);
      }
      .celeb-img-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: all 0.3s ease; }
      .celebrity-item:hover img { transform: scale(1.15); filter: brightness(0.7); }
      .celeb-name { font-size: 0.9rem; font-weight: 500; color: white; }
    </style>
  </head>
  <body>

    <nav class="navbar navbar-expand-lg bg-dark-subtle border-bottom border-body p-3 rounded-bottom-4 shadow-sm">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#">
          <img src="icon.png" alt="Logo" width="60" height="37" class="d-inline-block align-text-top me-2">
        </a>
        <div class="d-flex align-items-center ms-auto">
          <ul class="navbar-nav me-3">
            <li class="nav-item"><a class="nav-link" href="#">Iniciar Sesión</a></li>
          </ul>
          <button class="btn btn-outline-secondary btn-sm rounded-pill px-3" type="button">ES</button>
        </div>
      </div>
    </nav>

    <div class="container mt-5">
      <div class="row g-4">
        <div class="col-lg-8">
          <div id="movieCarousel" class="carousel slide carousel-fade" data-bs-ride="carousel">
            <div class="carousel-inner" id="carousel-content">
              <div class="carousel-item active">
                <div class="d-flex align-items-center justify-content-center" style="height: 500px; background: #222;">
                  <div class="spinner-border text-primary" role="status"></div>
                </div>
              </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#movieCarousel" data-bs-slide="prev">
              <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#movieCarousel" data-bs-slide="next">
              <span class="carousel-control-next-icon"></span>
            </button>
          </div>
        </div>

        <div class="col-lg-4 d-flex flex-column">
          <h5 class="text-warning fw-bold mb-3">A continuación</h5>
          <div id="next-movies-list" class="next-movies-container flex-grow-1"></div>
          <div class="mt-3">
            <button class="btn btn-link text-white fw-bold text-decoration-none p-0">
              Explorar Tráileres <i class="bi bi-chevron-right"></i>
            </button>
          </div>
        </div>
      </div>

      <hr class="text-secondary my-5" style="opacity: 0.3;">

      <div class="row">
        <div class="col-12 mb-4">
          <h4 class="text-warning fw-bold">Destacado Hoy</h4>
        </div>
        <div class="col-md-6 mb-4">
          <div class="featured-card">
            <div class="featured-img-container" style="background-color: #222;">
              <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?auto=format&fit=crop&q=80&w=1000" alt="Galería">
              <div class="overlay-text"><span class="text-white fw-bold"><i class="bi bi-images me-2"></i>Mirar galería</span></div>
            </div>
          </div>
        </div>
        <div class="col-md-6 mb-4">
          <div class="featured-card">
            <div class="featured-img-container" style="background-color: #222;">
              <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&q=80&w=1000" alt="Encuestas">
              <div class="overlay-text"><span class="text-white fw-bold"><i class="bi bi-patch-check me-2"></i>Encuesta de la semana</span></div>
            </div>
          </div>
        </div>
      </div>

      <hr class="text-secondary my-5" style="opacity: 0.3;">

      <div class="row">
        <div class="col-12">
          <div class="section-header">
            <div class="yellow-line"></div>
            <h4 class="text-white fw-bold mb-0">Celebridades más populares <i class="bi bi-chevron-right fs-5"></i></h4>
          </div>
          <div class="d-flex justify-content-between align-items-center mt-2">
             <p class="text-secondary mb-0">Los mejores en Ascenso</p>
             <p class="text-secondary mb-0">por posición</p>
             <div style="width: 100px;"></div>
          </div>
        </div>
      </div>

      <div class="position-relative">
        <div class="celebrity-scroll" id="celebScroll"></div>
        <button class="btn btn-dark btn-sm rounded-circle position-absolute top-50 start-0 translate-middle-y" onclick="scrollCelebs(-400)" style="z-index: 5;"><i class="bi bi-chevron-left"></i></button>
        <button class="btn btn-dark btn-sm rounded-circle position-absolute top-50 end-0 translate-middle-y" onclick="scrollCelebs(400)" style="z-index: 5;"><i class="bi bi-chevron-right"></i></button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const API_KEY = 'ad9c7b13b24f9c633e5064880d4c7512'; 
      const carouselContent = document.getElementById('carousel-content');
      const nextMoviesList = document.getElementById('next-movies-list');
      const celebScroll = document.getElementById('celebScroll');
      let allMovies = [];

      async function fetchData() {
        try {
          // Cargar Películas
          const resMovies = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=es-MX&region=MX`);
          const dataMovies = await resMovies.json();
          if(dataMovies.results) {
            allMovies = dataMovies.results.slice(0, 6);
            renderMovies();
            updateSidebar(0);
          }

          // Cargar Celebridades
          const resCelebs = await fetch(`https://api.themoviedb.org/3/person/popular?api_key=${API_KEY}&language=es-MX`);
          const dataCelebs = await resCelebs.json();
          if(dataCelebs.results) {
            celebScroll.innerHTML = dataCelebs.results.slice(0, 24).map(person => `
              <div class="celebrity-item">
                <div class="celeb-img-wrapper"><img src="https://image.tmdb.org/t/p/w200${person.profile_path}" alt="${person.name}"></div>
                <div class="celeb-name">${person.name}</div>
              </div>
            `).join('');
          }
        } catch (e) { console.error("Error:", e); }
      }

      function renderMovies() {
        carouselContent.innerHTML = allMovies.map((movie, index) => `
          <div class="carousel-item ${index === 0 ? 'active' : ''}">
            <img src="https://image.tmdb.org/t/p/original${movie.backdrop_path}" class="d-block w-100">
            <div class="carousel-caption">
              <span class="badge bg-primary mb-2">Rating: ${movie.vote_average}</span>
              <h3 class="fw-bold text-white">${movie.title || movie.original_title}</h3>
              <p class="d-none d-md-block opacity-75 text-white">${movie.overview ? movie.overview.substring(0, 150) : 'Sin descripción...'}...</p>
              <div class="mt-2">
                <button class="btn btn-primary btn-sm rounded-pill px-3"><i class="bi bi-play-fill"></i> Ver ahora</button>
                <span class="ms-2 text-white-50"><small>Mira el trailer</small></span>
              </div>
            </div>
          </div>
        `).join('');
      }

      function updateSidebar(idx) {
        let html = '';
        for (let i = 1; i <= 3; i++) {
          const m = allMovies[(idx + i) % allMovies.length];
          html += `
            <div class="movie-side-card">
              <img src="https://image.tmdb.org/t/p/w200${m.poster_path}">
              <div class="movie-side-info">
                <h6>${m.title || m.original_title}</h6>
                <p>Duración: 124 min</p>
                <div class="d-flex align-items-center mt-1">
                  <i class="bi bi-play-circle-fill fs-5 text-light"></i>
                  <span class="ms-2 small opacity-75">Mira el trailer</span>
                </div>
              </div>
            </div>`;
        }
        nextMoviesList.innerHTML = html;
      }

      function scrollCelebs(dist) { celebScroll.scrollBy({ left: dist, behavior: 'smooth' }); }

      document.getElementById('movieCarousel').addEventListener('slide.bs.carousel', e => updateSidebar(e.to));
      fetchData();
    </script>
  </body>
</html>
